name: Publish Document
on:
  push:
    branches:
      - main  # Trigger this workflow whenever the main branch changes.
    workflow_dispatch:    # Allow manual runs from the GitHub UI (adds a "Run workflow" button under Actions).
permissions:
  contents: write   # Required so the workflow can push to the gh-pages branch.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4  # Pull the repository contents.
      with:
        persist-credentials: false   # Skip the default GITHUB_TOKEN credential helper; the deploy step uses its own token.

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.x   # Install Python.

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygments==2.17.2 pymdown-extensions
        pip install mkdocs-exclude
        pip install mkdocs-material==9.6.8
        pip install jieba==0.42.1   # Install build dependencies.
        pip install mkdocs-swagger-ui-tag

    - name: Resolve deployment target
      id: target
      # Upstream repo (justlend/justlend-docs) uses docs.justlend.org + CNAME.
      # Any fork uses the github.io subpath and skips the CNAME so it does not
      # try to claim the custom domain.
      env:
        REPO: ${{ github.repository }}
        OWNER: ${{ github.repository_owner }}
        NAME: ${{ github.event.repository.name }}
      run: |
        if [ "$REPO" = "justlend/justlend-docs" ]; then
          echo "site_url=https://docs.justlend.org/" >> "$GITHUB_OUTPUT"
          echo "with_cname=true" >> "$GITHUB_OUTPUT"
        else
          echo "site_url=https://${OWNER}.github.io/${NAME}/" >> "$GITHUB_OUTPUT"
          echo "with_cname=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Build the document
      env:
        SITE_URL: ${{ steps.target.outputs.site_url }}
      run: mkdocs build  # Build the MkDocs site; site_url is injected from the previous step.

    - name: Add CNAME file
      if: steps.target.outputs.with_cname == 'true'
      run: echo 'docs.justlend.org' > site/CNAME

    - name: Deploy
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        # Prefer a custom PAT named TOKEN if the repo provides one; otherwise
        # fall back to the auto-injected GITHUB_TOKEN (works on forks too).
        token: ${{ secrets.TOKEN || secrets.GITHUB_TOKEN }}
        branch: gh-pages  # Publish the built site to the gh-pages branch.
        folder: site      # MkDocs default build output directory.
